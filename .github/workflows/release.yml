name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no tag, no publish)"
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── Compute the next version. We pin it before building any binaries so all
  #    artifacts carry the same version string. ────────────────────────────────
  plan:
    name: plan release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.next.outputs.version }}
      will_release: ${{ steps.next.outputs.will_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - id: next
        name: compute next version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # semantic-release --dry-run emits "The next release version is X.Y.Z"
          DRY_OUTPUT="$(npx semantic-release --dry-run --no-ci 2>&1 || true)"
          echo "$DRY_OUTPUT"
          VERSION="$(echo "$DRY_OUTPUT" | grep -oE 'next release version is [0-9]+\.[0-9]+\.[0-9]+' | tail -n1 | awk '{print $5}')"
          if [ -z "$VERSION" ]; then
            echo "will_release=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "::notice ::No release needed — no qualifying commits since last tag."
          else
            echo "will_release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "::notice ::Next release will be v$VERSION."
          fi

  # ── Cross-platform build matrix. We over-write Cargo.toml's version so the
  #    binary's `--version` matches the imminent tag. ─────────────────────────
  build:
    name: build ${{ matrix.target }}
    needs: plan
    if: needs.plan.outputs.will_release == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset: hoppr-linux-x86_64.tar.gz
            cross: true
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            asset: hoppr-linux-aarch64.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            asset: hoppr-macos-x86_64.tar.gz
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-14
            asset: hoppr-macos-aarch64.tar.gz
            cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset: hoppr-windows-x86_64.zip
            cross: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: pin version
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.version }}"
          if [ -n "$VERSION" ]; then
            sed -i.bak -E "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
            rm Cargo.toml.bak
          fi
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: build
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --locked
          else
            cargo build --release --target ${{ matrix.target }} --locked
          fi
      - name: package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BIN="hoppr"
          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then EXT=".exe"; fi
          STAGE="hoppr-${{ needs.plan.outputs.version }}-${{ matrix.target }}"
          mkdir "$STAGE"
          cp "target/${{ matrix.target }}/release/${BIN}${EXT}" "$STAGE/"
          cp README.md LICENSE "$STAGE/"
          if [[ "${{ matrix.asset }}" == *.zip ]]; then
            7z a "dist/${{ matrix.asset }}" "$STAGE"
          else
            tar -czf "dist/${{ matrix.asset }}" "$STAGE"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  # ── Run semantic-release for real, attaching every binary as a release asset.
  release:
    name: semantic-release
    needs: [plan, build]
    if: needs.plan.outputs.will_release == 'true' && github.event.inputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: pull binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: list binaries
        run: ls -la dist
      - name: checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: npx semantic-release

  dry-run:
    name: dry-run summary
    needs: plan
    if: github.event.inputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Dry run only — no tag, no GitHub Release."
          npx semantic-release --dry-run
