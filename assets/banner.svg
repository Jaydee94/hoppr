<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="hoppr banner">
  <title>hoppr — fast, minimal TUI launcher for SSH and other remote shells</title>
  <defs>
    <linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="60%" stop-color="#12131a"/>
      <stop offset="100%" stop-color="#0a0b10"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78aff"/>
      <stop offset="55%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#7c5cff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#1a1c25" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="320" fill="url(#bgg)"/>
  <rect width="1280" height="320" fill="url(#grid)" opacity="0.5"/>
  <circle cx="1000" cy="160" r="320" fill="url(#halo)"/>

  <!-- subtle bracket frame -->
  <g stroke="url(#rim)" stroke-width="1.2" fill="none">
    <path d="M 24 24 L 24 80"/><path d="M 24 24 L 80 24"/>
    <path d="M 1256 24 L 1256 80"/><path d="M 1256 24 L 1200 24"/>
    <path d="M 24 296 L 24 240"/><path d="M 24 296 L 80 296"/>
    <path d="M 1256 296 L 1256 240"/><path d="M 1256 296 L 1200 296"/>
  </g>

  <!-- logo mark left -->
  <g transform="translate(96 80)" filter="url(#glow)">
    <rect x="0" y="120" width="56" height="14" rx="4" fill="url(#brand)"/>
    <rect x="112" y="120" width="56" height="14" rx="4" fill="url(#brand)"/>
    <path d="M 28 120 Q 84 32 140 120" fill="none" stroke="url(#brand)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="84" cy="54" r="10" fill="#a78aff"/>
    <circle cx="84" cy="54" r="14" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- wordmark -->
  <g transform="translate(320 0)">
    <text x="0" y="170"
          font-family="ui-sans-serif, -apple-system, 'Segoe UI', Inter, system-ui, sans-serif"
          font-size="128" font-weight="800"
          fill="url(#brand)" letter-spacing="-6">hoppr</text>
    <text x="6" y="220"
          font-family="ui-monospace, 'JetBrains Mono', 'Fira Code', monospace"
          font-size="22" font-weight="500"
          fill="#8a92a6" letter-spacing="2">
      fast · minimal · TUI launcher for SSH &amp; remote shells
    </text>

    <!-- pill tags -->
    <g transform="translate(0 248)" font-family="ui-monospace, monospace" font-size="14" fill="#a78aff">
      <g><rect x="0" y="0" width="80" height="26" rx="13" fill="none" stroke="#3a3e4e"/><text x="40" y="18" text-anchor="middle" fill="#7c5cff">rust</text></g>
      <g><rect x="92" y="0" width="80" height="26" rx="13" fill="none" stroke="#3a3e4e"/><text x="132" y="18" text-anchor="middle" fill="#00e5ff">ratatui</text></g>
      <g><rect x="184" y="0" width="100" height="26" rx="13" fill="none" stroke="#3a3e4e"/><text x="234" y="18" text-anchor="middle" fill="#a78aff">git-sync</text></g>
      <g><rect x="296" y="0" width="100" height="26" rx="13" fill="none" stroke="#3a3e4e"/><text x="346" y="18" text-anchor="middle" fill="#00d68f">cross-shell</text></g>
    </g>
  </g>
</svg>
