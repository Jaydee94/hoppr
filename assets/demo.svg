<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="hoppr TUI demo">
  <title>hoppr TUI</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78aff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace; }
      .text { fill: #f1f3f9; }
      .dim  { fill: #8a92a6; }
      .muted{ fill: #555c70; }
      .primary    { fill: #7c5cff; }
      .primary-g  { fill: #a78aff; }
      .accent     { fill: #00e5ff; }
      .success    { fill: #00d68f; }
      .warning    { fill: #ffb547; }
      .error      { fill: #ff5470; }
      .b          { font-weight: 700; }

      @keyframes blink { 50% { opacity: 0; } }
      .caret { animation: blink 1s steps(2) infinite; }
    ]]></style>
  </defs>

  <!-- terminal window chrome -->
  <rect x="0" y="0" width="1200" height="700" rx="14" fill="#0a0b10"/>
  <rect x="0" y="0" width="1200" height="36" rx="14" fill="#12131a"/>
  <rect x="0" y="28" width="1200" height="8" fill="#12131a"/>
  <g transform="translate(20 18)">
    <circle r="6" fill="#ff5470"/>
    <circle cx="22" r="6" fill="#ffb547"/>
    <circle cx="44" r="6" fill="#00d68f"/>
  </g>
  <text x="600" y="22" text-anchor="middle" class="mono dim" font-size="12">hoppr — remote shell launcher</text>

  <!-- header -->
  <g transform="translate(24 64)">
    <text x="0" y="22" class="mono b primary-g" font-size="22">hoppr</text>
    <text x="92" y="22" class="mono accent" font-size="22">▍</text>
    <text x="108" y="22" class="mono primary" font-size="22">▍</text>
    <text x="124" y="22" class="mono primary-g" font-size="22">▍</text>
    <text x="0" y="44" class="mono dim" font-size="12">remote shell launcher</text>
  </g>

  <!-- search box -->
  <g transform="translate(260 56)">
    <rect width="900" height="36" rx="6" fill="none" stroke="#3a3e4e"/>
    <text x="14" y="23" class="mono accent" font-size="14">󰍉</text>
    <text x="40" y="23" class="mono text" font-size="14">prod</text>
    <rect class="caret" x="78" y="12" width="2" height="16" fill="#00e5ff"/>
    <text x="20" y="-6" class="mono dim" font-size="11">Search</text>
  </g>

  <!-- body: categories + hosts -->
  <g transform="translate(24 116)">
    <!-- categories panel -->
    <rect width="320" height="490" rx="6" fill="none" stroke="#252834"/>
    <text x="14" y="-6" class="mono dim" font-size="11">Categories</text>

    <g class="mono" font-size="14" transform="translate(16 26)">
      <g transform="translate(0 0)">
        <text class="primary">  </text>
        <text x="22" class="dim">🏠 Home</text>
      </g>
      <g transform="translate(0 28)">
        <text class="primary b">▍ </text>
        <rect x="-2" y="-18" width="304" height="26" rx="4" fill="#1a1c25"/>
        <text class="primary b">▍ </text>
        <text x="22" class="text b">🚀 Production</text>
      </g>
      <g transform="translate(0 56)">
        <text class="primary">  </text>
        <text x="22" class="dim">🧪 Staging</text>
      </g>
      <g transform="translate(0 84)">
        <text class="primary">  </text>
        <text x="22" class="dim">🔬 Lab</text>
      </g>
      <g transform="translate(0 112)">
        <text class="primary">  </text>
        <text x="22" class="dim">📦 Edge</text>
      </g>
    </g>
  </g>

  <!-- hosts panel -->
  <g transform="translate(360 116)">
    <rect width="816" height="490" rx="6" fill="none" stroke="#7c5cff" stroke-width="1.5"/>
    <text x="14" y="-6" class="mono primary-g b" font-size="11">Hosts · Production</text>

    <g class="mono" font-size="14" transform="translate(16 28)">
      <g transform="translate(0 0)">
        <text class="accent b">▍ </text>
        <rect x="-2" y="-18" width="796" height="26" rx="4" fill="#1a1c25"/>
        <text class="accent b">▍ </text>
        <text x="22" class="text b">prod-gateway</text>
        <text x="200" class="muted">ssh deploy@10.4.0.1:22</text>
      </g>
      <g transform="translate(0 30)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-db-primary</text>
        <text x="200" class="muted">ssh deploy@10.4.0.10:22</text>
      </g>
      <g transform="translate(0 60)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-db-replica</text>
        <text x="200" class="muted">mosh deploy@10.4.0.11</text>
      </g>
      <g transform="translate(0 90)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-cache</text>
        <text x="200" class="muted">ssh deploy@10.4.0.20:22</text>
      </g>
      <g transform="translate(0 120)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-worker-01</text>
        <text x="200" class="muted">ssh deploy@10.4.1.1:22</text>
      </g>
      <g transform="translate(0 150)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-worker-02</text>
        <text x="200" class="muted">ssh deploy@10.4.1.2:22</text>
      </g>
      <g transform="translate(0 180)">
        <text class="accent">  </text>
        <text x="22" class="dim">prod-build</text>
        <text x="200" class="muted">kitty +kitten ssh -p 2200 ci@build.prod</text>
      </g>
    </g>
  </g>

  <!-- status bar -->
  <g transform="translate(24 624)" class="mono" font-size="12">
    <circle cx="6" cy="-4" r="5" class="success"/>
    <text x="20" y="0" class="dim">sync ok</text>
    <text x="190" y="0" class="muted">pulled config-repo · main · 7m ago</text>
    <text x="1156" y="0" text-anchor="end" class="text">7/24</text>
    <text x="1170" y="0" text-anchor="end" class="muted"> hosts</text>
  </g>

  <!-- hints -->
  <g transform="translate(0 666)" class="mono" font-size="12">
    <text x="600" text-anchor="middle">
      <tspan class="primary-g b">[Tab]</tspan> <tspan class="dim">Focus</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[/]</tspan> <tspan class="dim">Search</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[e]</tspan> <tspan class="dim">Settings</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[↩]</tspan> <tspan class="dim">Connect</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[q]</tspan> <tspan class="dim">Quit</tspan>
    </text>
  </g>
</svg>
