<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 860" role="img" aria-label="hoppr TUI walk-through">
  <title>hoppr TUI — Browse, Search, Settings, Connect</title>
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78aff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <style><![CDATA[
      .mono { font-family: ui-monospace, "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace; }
      .text { fill: #f1f3f9; }
      .dim  { fill: #8a92a6; }
      .muted{ fill: #555c70; }
      .primary    { fill: #7c5cff; }
      .primary-g  { fill: #a78aff; }
      .accent     { fill: #00e5ff; }
      .success    { fill: #00d68f; }
      .warning    { fill: #ffb547; }
      .error      { fill: #ff5470; }
      .b          { font-weight: 700; }

      @keyframes blink { 50% { opacity: 0; } }
      .caret { animation: blink 1s steps(2) infinite; }
    ]]></style>

    <!-- Reusable terminal-window chrome -->
    <symbol id="chrome" viewBox="0 0 600 380">
      <rect x="0" y="0" width="600" height="380" rx="10" fill="#0a0b10"/>
      <rect x="0" y="0" width="600" height="24" rx="10" fill="#12131a"/>
      <rect x="0" y="18" width="600" height="6" fill="#12131a"/>
      <g transform="translate(12 12)">
        <circle r="4" fill="#ff5470"/>
        <circle cx="14" r="4" fill="#ffb547"/>
        <circle cx="28" r="4" fill="#00d68f"/>
      </g>
    </symbol>

    <!-- A single hint chip: [key] label -->
    <symbol id="kbd-tab" overflow="visible">
      <text class="mono primary-g b" font-size="10">[Tab]</text>
      <text class="mono dim" font-size="10" x="34">Focus</text>
    </symbol>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="860" fill="#06070b"/>

  <!-- ──────────────── Title bar ──────────────── -->
  <g transform="translate(40 24)">
    <text class="mono b" font-size="18" fill="url(#brand)">hoppr</text>
    <text x="74" y="0" class="mono dim" font-size="13" dy="-1">— a four-keystroke tour</text>
  </g>

  <!-- ────────────── Frame 1: BROWSE ────────────── -->
  <g transform="translate(40 60)">
    <!-- step badge -->
    <g>
      <rect width="32" height="32" rx="16" fill="#1a1c25" stroke="#7c5cff"/>
      <text x="16" y="22" text-anchor="middle" class="mono primary-g b" font-size="14">1</text>
    </g>
    <text x="46" y="22" class="mono text b" font-size="14">Browse — categories on the left, hosts on the right</text>

    <g transform="translate(0 44)">
      <use href="#chrome" width="600" height="380"/>

      <!-- header: hoppr brand + idle search -->
      <g transform="translate(20 44)">
        <text class="mono b primary-g" font-size="16">hoppr</text>
        <text x="62" class="mono accent" font-size="16">▍</text>
        <text x="74" class="mono primary" font-size="16">▍</text>
        <text x="86" class="mono primary-g" font-size="16">▍</text>
        <text y="18" class="mono dim" font-size="10">remote shell launcher</text>
      </g>
      <g transform="translate(180 38)">
        <rect width="400" height="26" rx="5" fill="none" stroke="#3a3e4e"/>
        <text x="10" y="17" class="mono dim" font-size="11">󰍉  Type / to search</text>
      </g>

      <!-- categories (focused) -->
      <g transform="translate(20 96)">
        <rect width="170" height="240" rx="5" fill="none" stroke="#7c5cff" stroke-width="1.5"/>
        <text x="10" y="-4" class="mono primary-g b" font-size="10">Categories</text>
        <g class="mono" font-size="11" transform="translate(10 18)">
          <g><rect x="-4" y="-12" width="160" height="20" rx="3" fill="#1a1c25"/>
            <text class="primary b">▍</text><text x="12" class="text b">🏠 Home</text></g>
          <g transform="translate(0 22)"><text class="primary">  </text><text x="12" class="dim">🚀 Production</text></g>
          <g transform="translate(0 44)"><text class="primary">  </text><text x="12" class="dim">🧪 Staging</text></g>
          <g transform="translate(0 66)"><text class="primary">  </text><text x="12" class="dim">🔬 Lab</text></g>
          <g transform="translate(0 88)"><text class="primary">  </text><text x="12" class="dim">📦 Edge</text></g>
        </g>
      </g>

      <!-- hosts (unfocused) -->
      <g transform="translate(200 96)">
        <rect width="380" height="240" rx="5" fill="none" stroke="#252834"/>
        <text x="10" y="-4" class="mono dim" font-size="10">Hosts · Home</text>
        <g class="mono" font-size="11" transform="translate(10 18)">
          <g><text class="accent">  </text><text x="12" class="dim">router</text><text x="190" class="muted">ssh admin@192.168.1.1</text></g>
          <g transform="translate(0 22)"><text class="accent">  </text><text x="12" class="dim">nas</text><text x="190" class="muted">ssh admin@192.168.1.2</text></g>
        </g>
      </g>

      <!-- status -->
      <g transform="translate(20 350)" class="mono" font-size="9">
        <circle cx="5" cy="-3" r="4" class="success"/>
        <text x="16" class="dim">sync ok</text>
        <text x="100" class="muted">pulled inventory · main · 2m ago</text>
        <text x="560" text-anchor="end" class="text">2/19</text><text x="572" text-anchor="end" class="muted"> hosts</text>
      </g>
    </g>
  </g>

  <!-- arrow with keypress between frame 1 → 2 -->
  <g transform="translate(660 240)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#3a3e4e" stroke-width="2"/>
    <polygon points="40,-5 50,0 40,5" fill="#3a3e4e"/>
    <g transform="translate(8 -16)">
      <rect width="34" height="14" rx="3" fill="#1a1c25" stroke="#7c5cff"/>
      <text x="17" y="11" text-anchor="middle" class="mono primary-g b" font-size="9">/</text>
    </g>
  </g>

  <!-- ────────────── Frame 2: SEARCH ────────────── -->
  <g transform="translate(720 60)">
    <g>
      <rect width="32" height="32" rx="16" fill="#1a1c25" stroke="#00e5ff"/>
      <text x="16" y="22" text-anchor="middle" class="mono accent b" font-size="14">2</text>
    </g>
    <text x="46" y="22" class="mono text b" font-size="14">Press / and fuzzy-match across every host</text>

    <g transform="translate(0 44)">
      <use href="#chrome" width="600" height="380"/>
      <g transform="translate(20 44)">
        <text class="mono b primary-g" font-size="16">hoppr</text>
        <text y="18" class="mono dim" font-size="10">remote shell launcher</text>
      </g>
      <!-- focused search -->
      <g transform="translate(180 38)">
        <rect width="400" height="26" rx="5" fill="none" stroke="#00e5ff" stroke-width="1.5"/>
        <text x="10" y="17" class="mono accent" font-size="11">󰍉</text>
        <text x="28" y="17" class="mono text" font-size="11">prod</text>
        <rect class="caret" x="56" y="6" width="1.5" height="14" fill="#00e5ff"/>
        <text x="14" y="-4" class="mono accent b" font-size="9">Search</text>
      </g>

      <g transform="translate(20 96)">
        <rect width="170" height="240" rx="5" fill="none" stroke="#252834"/>
        <text x="10" y="-4" class="mono dim" font-size="10">Categories</text>
        <g class="mono" font-size="11" transform="translate(10 18)">
          <g transform="translate(0 0)"><text class="primary">  </text><text x="12" class="dim">🏠 Home</text></g>
          <g transform="translate(0 22)"><rect x="-4" y="-12" width="160" height="20" rx="3" fill="#1a1c25"/><text class="primary b">▍</text><text x="12" class="text b">🚀 Production</text></g>
          <g transform="translate(0 44)"><text class="primary">  </text><text x="12" class="dim">🧪 Staging</text></g>
          <g transform="translate(0 66)"><text class="primary">  </text><text x="12" class="dim">🔬 Lab</text></g>
        </g>
      </g>

      <!-- filtered hosts highlight -->
      <g transform="translate(200 96)">
        <rect width="380" height="240" rx="5" fill="none" stroke="#252834"/>
        <text x="10" y="-4" class="mono dim" font-size="10">Hosts · Production · 5 matches</text>
        <g class="mono" font-size="11" transform="translate(10 18)">
          <g><rect x="-4" y="-12" width="370" height="20" rx="3" fill="#1a1c25"/><text class="accent b">▍</text><text x="12" class="text b">prod-gateway</text><text x="160" class="muted">ssh deploy@10.4.0.1</text></g>
          <g transform="translate(0 22)"><text class="accent">  </text><text x="12" class="dim">prod-db-primary</text><text x="160" class="muted">ssh deploy@10.4.0.10</text></g>
          <g transform="translate(0 44)"><text class="accent">  </text><text x="12" class="dim">prod-db-replica</text><text x="160" class="muted">mosh deploy@10.4.0.11</text></g>
          <g transform="translate(0 66)"><text class="accent">  </text><text x="12" class="dim">prod-cache</text><text x="160" class="muted">ssh deploy@10.4.0.20</text></g>
          <g transform="translate(0 88)"><text class="accent">  </text><text x="12" class="dim">prod-worker-01</text><text x="160" class="muted">ssh deploy@10.4.1.1</text></g>
        </g>
      </g>

      <g transform="translate(20 350)" class="mono" font-size="9">
        <circle cx="5" cy="-3" r="4" class="success"/>
        <text x="16" class="dim">sync ok</text>
        <text x="560" text-anchor="end" class="text">5/19</text><text x="572" text-anchor="end" class="muted"> hosts</text>
      </g>
    </g>
  </g>

  <!-- arrow with keypress between frame 2 → 3 -->
  <g transform="translate(340 480)">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#3a3e4e" stroke-width="2"/>
    <polygon points="-5,20 0,30 5,20" fill="#3a3e4e"/>
    <g transform="translate(-15 -10)">
      <rect width="34" height="14" rx="3" fill="#1a1c25" stroke="#7c5cff"/>
      <text x="17" y="11" text-anchor="middle" class="mono primary-g b" font-size="9">e</text>
    </g>
  </g>

  <!-- arrow with keypress between frame 1 → 3 not needed; we go 2 → 3 → 4 -->
  <g transform="translate(1020 480)">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#3a3e4e" stroke-width="2"/>
    <polygon points="-5,20 0,30 5,20" fill="#3a3e4e"/>
    <g transform="translate(-19 -10)">
      <rect width="40" height="14" rx="3" fill="#1a1c25" stroke="#00e5ff"/>
      <text x="20" y="11" text-anchor="middle" class="mono accent b" font-size="9">Enter</text>
    </g>
  </g>

  <!-- ────────────── Frame 3: SETTINGS ────────────── -->
  <g transform="translate(40 480)">
    <g>
      <rect width="32" height="32" rx="16" fill="#1a1c25" stroke="#7c5cff"/>
      <text x="16" y="22" text-anchor="middle" class="mono primary-g b" font-size="14">3</text>
    </g>
    <text x="46" y="22" class="mono text b" font-size="14">Press e — in-TUI settings: add hosts, edit categories</text>

    <g transform="translate(0 44)">
      <use href="#chrome" width="600" height="320"/>
      <!-- dimmed background hint -->
      <rect x="20" y="40" width="560" height="260" rx="5" fill="#0d0e14" opacity="0.6"/>

      <!-- settings overlay -->
      <g transform="translate(60 60)">
        <rect width="480" height="240" rx="8" fill="#12131a" stroke="#7c5cff" stroke-width="1.5"/>
        <text x="16" y="20" class="mono primary-g b" font-size="11"> Settings </text>

        <g class="mono" font-size="11" transform="translate(28 44)">
          <g><rect x="-6" y="-12" width="430" height="20" rx="3" fill="#1a1c25"/>
            <text class="primary b">▍</text><text x="14" class="text b">Manage categories</text>
            <text x="290" class="muted">a add · d delete · ↩ edit</text></g>
          <g transform="translate(0 26)"><text class="primary">  </text><text x="14" class="dim">Manage hosts</text>
            <text x="290" class="muted">add VMs, set user / port</text></g>
          <g transform="translate(0 52)"><text class="primary">  </text><text x="14" class="dim">Connection defaults</text>
            <text x="290" class="muted">ssh · mosh · template</text></g>
          <g transform="translate(0 78)"><text class="primary">  </text><text x="14" class="dim">Central repo sync</text>
            <text x="290" class="muted">share inventory with the team</text></g>
        </g>

        <!-- footer -->
        <g transform="translate(16 218)">
          <circle cx="4" cy="-3" r="4" class="success"/>
          <text x="14" class="mono dim" font-size="10">Saved · press s to write to disk</text>
        </g>
      </g>

      <g transform="translate(20 296)" class="mono" font-size="9">
        <text class="muted">Esc back · ↑↓ move · ↩ open · s save</text>
      </g>
    </g>
  </g>

  <!-- ────────────── Frame 4: CONNECT ────────────── -->
  <g transform="translate(720 480)">
    <g>
      <rect width="32" height="32" rx="16" fill="#1a1c25" stroke="#00d68f"/>
      <text x="16" y="22" text-anchor="middle" class="success b mono" font-size="14">4</text>
    </g>
    <text x="46" y="22" class="mono text b" font-size="14">Press ↩ — hoppr hands off to ssh in your terminal</text>

    <g transform="translate(0 44)">
      <use href="#chrome" width="600" height="320"/>
      <g class="mono" font-size="11" transform="translate(20 50)">
        <text class="dim">$ </text><text x="14" class="text">hoppr connect prod-gateway</text>

        <text y="22" class="muted">› ssh -p 22 deploy@10.4.0.1</text>

        <text y="50" class="success">Welcome to Ubuntu 24.04.1 LTS (GNU/Linux 6.8.0-45-generic x86_64)</text>
        <text y="68" class="dim"> System load:  0.18 1.13     Processes:           184</text>
        <text y="84" class="dim"> Usage of /:   42.1% of 78G  Users logged in:     1</text>
        <text y="100" class="dim"> Memory usage: 41%          IPv4 address:        10.4.0.1</text>
        <text y="118" class="dim"> Swap usage:   0%</text>

        <text y="148" class="muted">Last login: Sun May 17 04:12:08 2026 from 10.0.0.42</text>
        <text y="170" class="accent b">deploy@prod-gateway</text>
        <text y="170" x="156" class="text">:</text>
        <text y="170" x="164" class="primary-g b">~</text>
        <text y="170" x="178" class="text">$ </text>
        <rect class="caret" x="194" y="160" width="1.5" height="13" fill="#f1f3f9"/>
      </g>

      <g transform="translate(20 296)" class="mono" font-size="9">
        <text class="muted">exit the ssh session and you're back in hoppr, ready for the next hop.</text>
      </g>
    </g>
  </g>

  <!-- ────────────── Footer hint strip ────────────── -->
  <g transform="translate(0 832)" class="mono" font-size="11">
    <text x="640" text-anchor="middle">
      <tspan class="primary-g b">[Tab]</tspan> <tspan class="dim">Focus</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[/]</tspan> <tspan class="dim">Search</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[e]</tspan> <tspan class="dim">Settings</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[↩]</tspan> <tspan class="dim">Connect</tspan>
      <tspan class="muted">  ·  </tspan>
      <tspan class="primary-g b">[q]</tspan> <tspan class="dim">Quit</tspan>
    </text>
  </g>
</svg>
